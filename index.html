<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brynlee Carter Memorial Golf Tournament</title>
    <meta name="description" content="Annual memorial golf tournament supporting families with children who have complex medical conditions. September 26, 2026 at Wolf Hollow Golf Course.">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React and ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="root"></div>
    
    <!-- Your React Component -->
    <script type="text/babel" src="./golf-tournament-site.jsx"></script>
    
    <script type="text/babel">
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<CharityGolfTournament />);
        
        // Initialize Lucide icons
        lucide.createIcons();
    </script>
</body>
</html>
